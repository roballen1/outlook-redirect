<!DOCTYPE html>
<html>
<head><title>Signing in...</title></head>
<body>
<p>Completing sign in, please wait...</p>
<script>
  const params = new URLSearchParams(window.location.search);
  const hash = new URLSearchParams(window.location.hash.substring(1));
  const code = params.get('code') || hash.get('code');
  const error = params.get('error') || hash.get('error');
  const token = hash.get('access_token');

  if (token) {
    if (window.opener) {
      window.opener.postMessage({ access_token: token }, '*');
      window.close();
    }
  } else if (code) {
    if (window.opener) {
      window.opener.postMessage({ code: code }, '*');
      window.close();
    }
  } else if (error) {
    document.body.innerHTML = '<p>Error: ' + error + '. Please close this window and try again.</p>';
    if (window.opener) {
      window.opener.postMessage({ error: error }, '*');
    }
  } else {
    document.body.innerHTML = '<p>No token received. Please close this window and try again.</p>';
  }
</script>
</body>
</html>
